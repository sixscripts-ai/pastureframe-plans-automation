<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1100" viewBox="0 0 1600 1100">
<rect width="100%" height="100%" fill="#F7F3E8"/>
<style>
.t{font-family:Arial,Helvetica,sans-serif;fill:#252525;font-size:26px}
.small{font-family:Arial,Helvetica,sans-serif;fill:#252525;font-size:20px}
.label{font-family:Arial,Helvetica,sans-serif;fill:#252525;font-size:18px}
.head{font-family:Arial,Helvetica,sans-serif;fill:white;font-size:30px;font-weight:bold}
.dim{font-family:Arial,Helvetica,sans-serif;fill:#8A4B2F;font-size:18px;font-weight:bold}
</style>
<defs>
<marker id="arrow" markerWidth="10" markerHeight="10" refX="5" refY="5" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L10,5 L0,10 z" fill="#8A4B2F"/></marker>
</defs>
<rect x="0" y="0" width="1600" height="70" fill="#1F3B24"/>
<text x="50" y="45" class="head" text-anchor="start">WHEEL / SKID / TOW TONGUE DETAIL</text><rect x="230" y="620" width="900" height="70" fill="#D8B17A" stroke="#8A4B2F" stroke-width="4"/><text x="260" y="665" class="t" text-anchor="start">4x6 pressure-treated skid - bevel leading end</text><rect x="300" y="535" width="760" height="55" fill="#C89B61" stroke="#8A4B2F" stroke-width="3"/><text x="320" y="570" class="small" text-anchor="start">2x6 base frame through-bolted to skid as needed</text><circle cx="880" cy="710" r="120" fill="#222"/><circle cx="880" cy="710" r="68" fill="#6b6b6b"/><circle cx="880" cy="710" r="16" fill="#DADADA"/><rect x="845" y="515" width="70" height="115" fill="#A0A0A0" stroke="#252525" stroke-width="3"/><line x1="880" y1="590" x2="880" y2="710" stroke="#252525" stroke-width="8"/><text x="1010" y="695" class="t" text-anchor="start">20 in pneumatic wheel</text><text x="1010" y="735" class="small" text-anchor="start">600 lb+ rating each</text><text x="1010" y="770" class="small" text-anchor="start">higher rating preferred for rough ground</text><line x1="250" y1="655" x2="80" y2="775" stroke="#8A4B2F" stroke-width="14"/><circle cx="80" cy="790" r="30" fill="none" stroke="#8A4B2F" stroke-width="10"/><text x="80" y="865" class="small" text-anchor="middle">tow ring / hitch point</text><line x1="290" y1="675" x2="150" y2="755" stroke="#7D8178" stroke-width="5"/><text x="210" y="845" class="small" text-anchor="start">safety chain</text><line x1="880" y1="560" x2="1160" y2="380" stroke="#8A4B2F" stroke-width="3" marker-start="url(#arrow)" marker-end="url(#arrow)"/><text x="1180" y="380" class="t" text-anchor="start">Drill axle brackets after field-balance test.</text><text x="1180" y="420" class="small" text-anchor="start">Do not use small caster wheels on pasture.</text><line x1="650" y1="650" x2="610" y2="500" stroke="#8A4B2F" stroke-width="3" marker-start="url(#arrow)" marker-end="url(#arrow)"/><text x="260" y="470" class="t" text-anchor="start">Through-bolts, washers, and lock nuts at high-load points.</text><rect x="70" y="160" width="480" height="150" fill="#FFFFFF" stroke="#7D8178" stroke-width="2"/><text x="100" y="205" class="t" text-anchor="start">FINAL MOBILITY DECISION</text><text x="100" y="245" class="small" text-anchor="start">Skid + axle wheels + tow tongue.</text><text x="100" y="280" class="small" text-anchor="start">Wheel location is field-fit to actual finished weight.</text></svg>