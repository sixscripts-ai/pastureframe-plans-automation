<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1100" viewBox="0 0 1600 1100">
<rect width="100%" height="100%" fill="#F7F3E8"/>
<style>
.t{font-family:Arial,Helvetica,sans-serif;fill:#252525;font-size:26px}
.small{font-family:Arial,Helvetica,sans-serif;fill:#252525;font-size:20px}
.label{font-family:Arial,Helvetica,sans-serif;fill:#252525;font-size:18px}
.head{font-family:Arial,Helvetica,sans-serif;fill:white;font-size:30px;font-weight:bold}
.dim{font-family:Arial,Helvetica,sans-serif;fill:#8A4B2F;font-size:18px;font-weight:bold}
</style>
<defs>
<marker id="arrow" markerWidth="10" markerHeight="10" refX="5" refY="5" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L10,5 L0,10 z" fill="#8A4B2F"/></marker>
</defs>
<rect x="0" y="0" width="1600" height="70" fill="#1F3B24"/>
<text x="50" y="45" class="head" text-anchor="start">UPPER COOP INTERIOR - NEST / ROOST LAYOUT</text><rect x="260" y="180" width="1080.0" height="432.0" fill="#FFFFFF" stroke="#1F3B24" stroke-width="5"/><rect x="280" y="200" width="108" height="126" fill="#F1D6A8" stroke="#8A4B2F" stroke-width="3"/><text x="334" y="270" class="small" text-anchor="middle">Nest</text><rect x="400" y="200" width="108" height="126" fill="#F1D6A8" stroke="#8A4B2F" stroke-width="3"/><text x="454" y="270" class="small" text-anchor="middle">Nest</text><rect x="520" y="200" width="108" height="126" fill="#F1D6A8" stroke="#8A4B2F" stroke-width="3"/><text x="574" y="270" class="small" text-anchor="middle">Nest</text><text x="480" y="355" class="small" text-anchor="middle">3 nest boxes: approx. 12 in W x 12 in H x 14 in D each</text><rect x="710" y="310" width="500" height="22" fill="#8A4B2F" stroke="#252525" stroke-width="2"/><rect x="710" y="440" width="500" height="22" fill="#8A4B2F" stroke="#252525" stroke-width="2"/><text x="960" y="295" class="small" text-anchor="middle">removable roost bar</text><text x="960" y="430" class="small" text-anchor="middle">removable roost bar</text><text x="960" y="510" class="small" text-anchor="middle">Target total roost length: 10-12 linear ft</text><rect x="1170.0" y="200" width="140" height="160" fill="#DDECF7" stroke="#1F3B24" stroke-width="3"/><text x="1240.0" y="285" class="small" text-anchor="middle">Rear cleanout / egg access</text><rect x="285" y="502.0" width="120" height="80" fill="#DDECF7" stroke="#1F3B24" stroke-width="3"/><text x="345" y="548.0" class="small" text-anchor="middle">Pop door</text><line x1="345" y1="582.0" x2="345" y2="757.0" stroke="#8A4B2F" stroke-width="8"/><text x="345" y="792.0" class="small" text-anchor="middle">ramp down to run</text><line x1="260" y1="692.0" x2="1340.0" y2="692.0" stroke="#8A4B2F" stroke-width="3" marker-start="url(#arrow)" marker-end="url(#arrow)"/><text x="800.0" y="730.0" class="dim" text-anchor="middle">120 in / 10 ft coop length</text><line x1="190" y1="180" x2="190" y2="612.0" stroke="#8A4B2F" stroke-width="3" marker-start="url(#arrow)" marker-end="url(#arrow)"/><text x="155" y="396.0" class="dim" text-anchor="middle">48 in / 4 ft coop depth</text><rect x="500" y="522.0" width="180" height="65" fill="#EEF1E8" stroke="#7D8178" stroke-width="2"/><text x="590" y="562.0" class="small" text-anchor="middle">vent/window</text><rect x="70" y="780" width="500" height="190" fill="#FFFFFF" stroke="#7D8178" stroke-width="2"/><text x="100" y="820" class="t" text-anchor="start">LAYER MODE SPEC</text><text x="100" y="860" class="small" text-anchor="start">Recommended claim: 10-12 laying hens.</text><text x="100" y="895" class="small" text-anchor="start">Nests and roosts are removable for broiler mode.</text><text x="100" y="930" class="small" text-anchor="start">Do not claim more capacity without prototype data.</text></svg>