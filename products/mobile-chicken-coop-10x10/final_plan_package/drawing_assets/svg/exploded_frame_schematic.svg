<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1100" viewBox="0 0 1600 1100">
<rect width="100%" height="100%" fill="#F7F3E8"/>
<style>
.t{font-family:Arial,Helvetica,sans-serif;fill:#252525;font-size:26px}
.small{font-family:Arial,Helvetica,sans-serif;fill:#252525;font-size:20px}
.label{font-family:Arial,Helvetica,sans-serif;fill:#252525;font-size:18px}
.head{font-family:Arial,Helvetica,sans-serif;fill:white;font-size:30px;font-weight:bold}
.dim{font-family:Arial,Helvetica,sans-serif;fill:#8A4B2F;font-size:18px;font-weight:bold}
</style>
<defs>
<marker id="arrow" markerWidth="10" markerHeight="10" refX="5" refY="5" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L10,5 L0,10 z" fill="#8A4B2F"/></marker>
</defs>
<rect x="0" y="0" width="1600" height="70" fill="#1F3B24"/>
<text x="50" y="45" class="head" text-anchor="start">EXPLODED FRAME SCHEMATIC - ASSEMBLY STACK</text><rect x="280" y="790" width="780" height="120" fill="#D8B17A" stroke="#1F3B24" stroke-width="4"/><text x="295" y="858.0" class="t" text-anchor="start">1. 4x6 skids + 2x6 10 ft x 10 ft base</text><rect x="360" y="610" width="780" height="120" fill="#F9FBF5" stroke="#1F3B24" stroke-width="4"/><text x="375" y="678.0" class="t" text-anchor="start">2. 48 in lower run posts and rails</text><rect x="540" y="450" width="520" height="95" fill="#C89B61" stroke="#1F3B24" stroke-width="4"/><text x="555" y="505.5" class="t" text-anchor="start">3. 4 ft x 10 ft upper coop floor frame</text><rect x="560" y="285" width="520" height="110" fill="#FFFFFF" stroke="#1F3B24" stroke-width="4"/><text x="575" y="348.0" class="t" text-anchor="start">4. Upper coop wall frames with openings</text><rect x="520" y="150" width="620" height="80" fill="#E6E6E6" stroke="#252525" stroke-width="4"/><text x="535" y="198.0" class="t" text-anchor="start">5. Rafters, purlins, sloped roof panels</text><line x1="650" y1="760" x2="720" y2="730" stroke="#8A4B2F" stroke-width="4" marker-start="url(#arrow)" marker-end="url(#arrow)"/><line x1="760" y1="580" x2="790" y2="545" stroke="#8A4B2F" stroke-width="4" marker-start="url(#arrow)" marker-end="url(#arrow)"/><line x1="800" y1="430" x2="820" y2="395" stroke="#8A4B2F" stroke-width="4" marker-start="url(#arrow)" marker-end="url(#arrow)"/><line x1="810" y1="265" x2="820" y2="230" stroke="#8A4B2F" stroke-width="4" marker-start="url(#arrow)" marker-end="url(#arrow)"/><line x1="360" y1="730" x2="500" y2="610" stroke="#8A4B2F" stroke-width="6"/><line x1="1140" y1="730" x2="1000" y2="610" stroke="#8A4B2F" stroke-width="6"/><text x="1120" y="640" class="small" text-anchor="start">diagonal braces shown in rust</text><rect x="400" y="620" width="190" height="85" fill="none" stroke="#7D8178" stroke-width="2"/><rect x="910" y="620" width="190" height="85" fill="none" stroke="#7D8178" stroke-width="2"/><text x="410" y="735" class="small" text-anchor="start">hardware cloth panels</text><rect x="70" y="160" width="390" height="190" fill="#FFFFFF" stroke="#7D8178" stroke-width="2"/><text x="100" y="205" class="t" text-anchor="start">DRAWING REQUIREMENT</text><text x="100" y="245" class="small" text-anchor="start">This schematic is a draft proof asset.</text><text x="100" y="280" class="small" text-anchor="start">A final CAD exploded view should replace it.</text><text x="100" y="315" class="small" text-anchor="start">Must show brace locations and lumber sizes.</text></svg>